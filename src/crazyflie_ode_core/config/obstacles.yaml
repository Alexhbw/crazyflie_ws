# Obstacle configuration for Crazyflie ODE simulator
# Define cylinder obstacles that drones will avoid via artificial potential fields

obstacles:
  # Central thin pole — sits at the center of the breathing circle
  # Made very thin (r=0.05) so formation can pass through the center when contracted
  - id: "center_pole"
    type: "cylinder"
    x: 0.0
    y: 0.0
    z: 0.75
    radius: 0.05
    height: 1.5

  # Outer pillars at 1.9m radius, rotated 45° to sit between drone starting angles
  # Breathing circle max = 1.7m, so drones graze but don't penetrate

  - id: "pillar_ne"
    type: "cylinder"
    x: 1.34
    y: 1.34
    z: 1.0
    radius: 0.18
    height: 2.0

  - id: "pillar_nw"
    type: "cylinder"
    x: -1.34
    y: 1.34
    z: 1.0
    radius: 0.18
    height: 2.0

  - id: "pillar_sw"
    type: "cylinder"
    x: -1.34
    y: -1.34
    z: 1.0
    radius: 0.18
    height: 2.0

  - id: "pillar_se"
    type: "cylinder"
    x: 1.34
    y: -1.34
    z: 1.0
    radius: 0.18
    height: 2.0
